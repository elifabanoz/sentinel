services:

  # Relational database — users, domains, scans, findings
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentinel}
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel_dev_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # In-memory cache — rate limiting token bucket
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Message broker — scanner job queues
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-sentinel}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-sentinel_dev_pass}
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # API Gateway — auth, domain verification, job dispatch
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sentinel}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-sentinel}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-sentinel_dev_pass}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-sentinel}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-sentinel_dev_pass}
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-sentinel-dev-secret-key-change-in-production-min-32-chars}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # Frontend — Next.js dashboard
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

  # Scanner workers
  scanner-tls:
    build:
      context: .
      dockerfile: scanners/tls/Dockerfile
    restart: unless-stopped
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-sentinel}
      RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS:-sentinel_dev_pass}
      DATABASE_URL: postgresql://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:-sentinel_dev_pass}@postgres:5432/${POSTGRES_DB:-sentinel}
      REDIS_HOST: redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  scanner-sqli:
    build:
      context: .
      dockerfile: scanners/sqli/Dockerfile
    restart: unless-stopped
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-sentinel}
      RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS:-sentinel_dev_pass}
      DATABASE_URL: postgresql://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:-sentinel_dev_pass}@postgres:5432/${POSTGRES_DB:-sentinel}
      REDIS_HOST: redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  scanner-xss:
    build:
      context: .
      dockerfile: scanners/xss/Dockerfile
    restart: unless-stopped
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-sentinel}
      RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS:-sentinel_dev_pass}
      DATABASE_URL: postgresql://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:-sentinel_dev_pass}@postgres:5432/${POSTGRES_DB:-sentinel}
      REDIS_HOST: redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  scanner-osint:
    build:
      context: .
      dockerfile: scanners/osint/Dockerfile
    restart: unless-stopped
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-sentinel}
      RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS:-sentinel_dev_pass}
      DATABASE_URL: postgresql://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:-sentinel_dev_pass}@postgres:5432/${POSTGRES_DB:-sentinel}
      REDIS_HOST: redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  scanner-deps:
    build:
      context: .
      dockerfile: scanners/deps/Dockerfile
    restart: unless-stopped
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-sentinel}
      RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS:-sentinel_dev_pass}
      DATABASE_URL: postgresql://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:-sentinel_dev_pass}@postgres:5432/${POSTGRES_DB:-sentinel}
      REDIS_HOST: redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # OWASP Juice Shop — sadece lokal entegrasyon testleri için
  juice-shop:
    image: bkimminich/juice-shop:latest
    ports:
      - "3001:3000"
    profiles:
      - dev

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
