spring:
  application:
    name: sentinel-api-gateway

  # PostgreSQL connection — use service name from docker-compose
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sentinel}
    username: ${SPRING_DATASOURCE_USERNAME:sentinel}
    password: ${SPRING_DATASOURCE_PASSWORD:sentinel_dev_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Flyway migrations manage table schemas, so Hibernate should not create its own schema
      ddl-auto: validate
    show-sql: false

  # Flyway — run SQL migrations in db/migration folder in order
  flyway:
    enabled: true
    locations: classpath:db/migration

  # Redis — rate limiting
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379

  # RabbitMQ — scanner job queues
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:sentinel}
    password: ${SPRING_RABBITMQ_PASSWORD:sentinel_dev_pass}

server:
  port: 8080

# Actuator — /actuator/health endpoint
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# JWT secret key — should be provided as env variable in production
sentinel:
  jwt:
    secret: ${JWT_SECRET:sentinel-dev-secret-key-change-in-production-min-32-chars}
    expiration-ms: 86400000  # 24 saat
